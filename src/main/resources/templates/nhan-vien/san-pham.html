<!DOCTYPE html>

<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: dynamic-layout(~{::section})}">
<body>

<section>
    <div class="d-flex justify-content-between align-items-center mb-4">

        <h3>Quản lý sản phẩm</h3>

        <a th:href="@{/nhan-vien/san-pham/create}"
           class="btn btn-success">

            <i class="fa-solid fa-plus"></i>
            Thêm sản phẩm

        </a>

    </div>

    <!-- TÌM KIẾM + LỌC -->

    <div class="card shadow-sm border-0 mb-3">

        <div class="card-body">

            <form method="get"
                  th:action="@{/nhan-vien/san-pham}">

                <div class="row g-2">

                    <div class="col-md-5">

                        <input type="text"
                               name="keyword"
                               class="form-control"
                               placeholder="Tìm kiếm sản phẩm..."
                               th:value="${keyword}">

                    </div>

                    <div class="col-md-4">

                        <select name="danhMucId"
                                class="form-select">

                            <option value="">
                                Tất cả danh mục
                            </option>

                            <option th:each="dm : ${danhMucs}"
                                    th:value="${dm.idDanhMuc}"
                                    th:text="${dm.tenDanhMuc}"
                                    th:selected="${danhMucId == dm.idDanhMuc}">
                            </option>

                        </select>

                    </div>

                    <div class="col-md-3">

                        <button class="btn btn-warning w-100">
                            <i class="fa-solid fa-magnifying-glass"></i>
                            Tìm kiếm
                        </button>

                    </div>

                </div>

            </form>

        </div>

    </div>

    <!-- BẢNG -->

    <div class="card shadow-sm border-0">

        <div class="card-body">

            <table class="table table-hover align-middle">

                <thead class="table-light">

                <tr>

                    <th>ID</th>
                    <th>Tên sản phẩm</th>
                    <th>Danh mục</th>
                    <th>Giá</th>
                    <th>Trạng thái</th>
                    <th width="260">Thao tác</th>

                </tr>

                </thead>

                <tbody>

                <tr th:if="${#lists.isEmpty(list)}">

                    <td colspan="6"
                        class="text-center text-muted">

                        Không có dữ liệu

                    </td>

                </tr>

                <tr th:each="sp : ${list}">

                    <td th:text="${sp.idSanPham}"></td>

                    <td th:text="${sp.tenSanPham}"></td>

                    <td>

                    <span th:each="dm : ${danhMucs}"
                          th:if="${dm.idDanhMuc == sp.idDanhMuc}"
                          th:text="${dm.tenDanhMuc}">
                    </span>

                    </td>

                    <td th:text="${#numbers.formatDecimal(sp.gia,0,'POINT',0,'COMMA')} + ' đ'"></td>

                    <td>

                    <span class="badge bg-success"
                          th:if="${sp.trangThai}">
                        Hoạt động
                    </span>

                        <span class="badge bg-danger"
                              th:unless="${sp.trangThai}">
                        Ngừng bán
                    </span>

                    </td>

                    <td>

                        <a th:href="@{/nhan-vien/san-pham/edit/{id}(id=${sp.idSanPham})}"
                           class="btn btn-warning btn-sm">
                            Sửa
                        </a>

                        <a th:href="@{/nhan-vien/san-pham/detail/{id}(id=${sp.idSanPham})}"
                           class="btn btn-info btn-sm">
                            Chi tiết
                        </a>

                        <a th:href="@{/nhan-vien/san-pham/toggle/{id}(id=${sp.idSanPham})}"
                           class="btn btn-secondary btn-sm">

                            [[${sp.trangThai} ? 'Ngừng bán' : 'Hoạt động']]

                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

            <!-- PHÂN TRANG -->

            <nav th:if="${totalPages > 0}">

                <ul class="pagination justify-content-center">

                    <li class="page-item"
                        th:classappend="${currentPage == 0 ? 'disabled' : ''}">

                        <a class="page-link"
                           th:href="@{/nhan-vien/san-pham(
                            page=${currentPage-1},
                            keyword=${keyword},
                            danhMucId=${danhMucId})}">

                            «

                        </a>

                    </li>

                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0,totalPages-1)}"
                        th:classappend="${i == currentPage ? 'active' : ''}">

                        <a class="page-link"
                           th:text="${i+1}"
                           th:href="@{/nhan-vien/san-pham(
                            page=${i},
                            keyword=${keyword},
                            danhMucId=${danhMucId})}">
                        </a>

                    </li>

                    <li class="page-item"
                        th:classappend="${currentPage == totalPages-1 ? 'disabled' : ''}">

                        <a class="page-link"
                           th:href="@{/nhan-vien/san-pham(
                            page=${currentPage+1},
                            keyword=${keyword},
                            danhMucId=${danhMucId})}">

                            »

                        </a>

                    </li>

                </ul>

            </nav>

        </div>

    </div>
</section>

</body>
</html>
