<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết sản phẩm</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>Chi tiết sản phẩm</h3>

        <a th:href="@{/nhan-vien/san-pham}"
           class="btn btn-secondary">
            Quay lại
        </a>
    </div>

    <!-- THÔNG TIN SẢN PHẨM -->

    <div class="card mb-4">
        <div class="card-header">
            Thông tin sản phẩm
        </div>

        <div class="card-body">

            <div class="row">

                <div class="col-md-4 text-center">

                    <img th:src="@{'/images/' + ${sanPham.hinhAnh}}"
                         class="img-fluid rounded border"
                         style="max-height:250px">

                </div>

                <div class="col-md-8">

                    <table class="table table-bordered">

                        <tr>
                            <th width="200">Mã sản phẩm</th>
                            <td th:text="${sanPham.idSanPham}"></td>
                        </tr>

                        <tr>
                            <th>Tên sản phẩm</th>
                            <td th:text="${sanPham.tenSanPham}"></td>
                        </tr>

                        <tr>
                            <th>Giá bán</th>
                            <td>
                                <span th:text="${#numbers.formatDecimal(sanPham.gia,0,'COMMA',0,'POINT')}"></span>
                                VNĐ
                            </td>
                        </tr>

                        <tr>
                            <th>Ngày tạo</th>
                            <td th:text="${sanPhamChiTiet.ngayTao}"></td>
                        </tr>

                        <tr>
                            <th>Trạng thái</th>

                            <td>
                                <span class="badge bg-success"
                                      th:if="${sanPham.trangThai}">
                                    Đang bán
                                </span>

                                <span class="badge bg-danger"
                                      th:unless="${sanPham.trangThai}">
                                    Ngừng bán
                                </span>
                            </td>
                        </tr>

                        <tr>
                            <th>Mô tả</th>
                            <td th:text="${sanPhamChiTiet.moTa}"></td>
                        </tr>

                    </table>

                </div>

            </div>

        </div>
    </div>


    <!-- CÔNG THỨC -->

    <div class="card">

        <div class="card-header">
            Công thức pha chế
        </div>

        <div class="card-body">

            <table class="table table-bordered">

                <thead class="table-light">
                <tr>
                    <th>STT</th>
                    <th>Nguyên liệu</th>
                    <th>Định lượng</th>
                    <th>Đơn vị</th>
                </tr>
                </thead>

                <tbody>

                <tr th:if="${#lists.isEmpty(congThucs)}">
                    <td colspan="4"
                        class="text-center text-danger">
                        Chưa có công thức
                    </td>
                </tr>

                <tr th:each="ct,stt : ${congThucs}">

                    <td th:text="${stt.count}"></td>

                    <td th:text="${ct.nguyenLieu.tenNguyenLieu}"></td>

                    <td th:text="${ct.soLuong}"></td>

                    <td th:text="${ct.donViTinh}"></td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
