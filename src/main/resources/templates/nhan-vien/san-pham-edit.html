<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: dynamic-layout(~{::section})}">
<body>

<section>

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h3>Cập nhật sản phẩm</h3>

        <a th:href="@{/nhan-vien/san-pham}"
           class="btn btn-secondary">

            <i class="fa-solid fa-arrow-left"></i>
            Quay lại

        </a>

    </div>

    <div class="card shadow-sm border-0">

        <div class="card-body">

            <form th:action="@{/nhan-vien/san-pham/update}"
                  th:object="${sanPham}"
                  method="post">

                <input type="hidden"
                       th:field="*{idSanPham}">

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Tên sản phẩm
                        </label>

                        <input type="text"
                               class="form-control"
                               th:field="*{tenSanPham}">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Giá bán
                        </label>

                        <input type="number"
                               class="form-control"
                               th:field="*{gia}">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Danh mục
                        </label>

                        <select class="form-select"
                                th:field="*{idDanhMuc}">

                            <option th:each="dm : ${danhMucs}"
                                    th:value="${dm.idDanhMuc}"
                                    th:text="${dm.tenDanhMuc}">
                            </option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Hình ảnh
                        </label>

                        <input type="text"
                               class="form-control"
                               th:field="*{hinhAnh}">

                    </div>

                </div>

                <button class="btn btn-primary">

                    <i class="fa-solid fa-pen"></i>
                    Cập nhật

                </button>

            </form>

        </div>

    </div>

</section>

</body>
</html>
