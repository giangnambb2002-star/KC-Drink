<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: dynamic-layout(~{::section})}">

<body>

<section>

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h3>
            Chi tiết hóa đơn:
            <span class="text-primary"
                  th:text="${hoaDon.maHoaDon}">
            </span>
        </h3>

        <a href="/nhan-vien/hoa-don"
           class="btn btn-secondary">
            Quay lại
        </a>

    </div>

    <!-- Thông tin hóa đơn -->
    <div class="card mb-4">

        <div class="card-header bg-warning fw-bold">
            Thông tin hóa đơn
        </div>

        <div class="card-body">

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label class="fw-bold">Mã hóa đơn</label>
                    <div th:text="${hoaDon.maHoaDon}"></div>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="fw-bold">Ngày tạo</label>
                    <div th:text="${#temporals.format(hoaDon.ngayTao,'dd/MM/yyyy HH:mm')}"></div>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="fw-bold">Hình thức thanh toán</label>
                    <div th:text="${hoaDon.hinhThucThanhToan}"></div>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="fw-bold">Trạng thái</label>
                    <div>
                        <span class="badge bg-success"
                              th:text="${hoaDon.trangThai}">
                        </span>
                    </div>
                </div>

                <div class="col-md-12">
                    <label class="fw-bold">Ghi chú</label>
                    <div th:text="${hoaDon.ghiChu}"></div>
                </div>

            </div>

        </div>

    </div>

    <!-- Chi tiết sản phẩm -->
    <div class="card">

        <div class="card-header bg-primary text-white fw-bold">
            Danh sách sản phẩm
        </div>

        <div class="card-body">

            <table class="table table-bordered table-hover">

                <thead class="table-light">

                <tr>
                    <th>STT</th>
                    <th>Sản phẩm</th>
                    <th>Size</th>
                    <th>Topping</th>
                    <th>Số lượng</th>
                    <th>Đơn giá</th>
                    <th>Thành tiền</th>
                </tr>

                </thead>

                <tbody>

                <tr th:each="ct,stt : ${chiTiets}">

                    <td th:text="${stt.count}"></td>

                    <td th:text="${ct.tenSanPham}"></td>

                    <td th:text="${ct.tenSize}"></td>

                    <td th:text="${ct.tenTopping}"></td>

                    <td th:text="${ct.soLuong}"></td>

                    <td>
                        <span th:text="${#numbers.formatDecimal(ct.donGia,0,'POINT',0,'COMMA')}"></span> đ
                    </td>

                    <td>
                        <span th:text="${#numbers.formatDecimal(ct.thanhTien,0,'POINT',0,'COMMA')}"></span> đ
                    </td>

                </tr>

                </tbody>

            </table>

        </div>

        <div class="card-footer text-end">

            <h5>
                Tổng tiền:
                <span class="text-danger fw-bold">
                    <span th:text="${#numbers.formatDecimal(hoaDon.thanhTien,0,'POINT',0,'COMMA')}"></span> đ
                </span>
            </h5>

        </div>

    </div>

</section>

</body>
</html>
