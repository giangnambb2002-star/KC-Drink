<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>KC Drink - Đăng nhập</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    <link rel="stylesheet" href="/css/login.css">
</head>

<body>

<div class="overlay">

    <div class="login-card">

        <div class="logo-section">
            <img src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png" alt="KC Drink Logo">
            <div class="title">KC DRINK</div>
            <div class="subtitle">Hệ Thống Quản Lý Bán Hàng Tại Quầy</div>
        </div>

        <div class="error-container" th:if="${error != null}">
            <i class="fa-solid fa-circle-exclamation" style="color: #ff4d4d;"></i>
            <p class="error-text" th:text="${error}"></p>
        </div>

        <form th:action="@{/auth/login}" method="post">

            <div class="mb-3">
                <label class="form-label">Tài khoản (Username)</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                    <input type="text"
                           name="username"
                           class="form-control"
                           placeholder="Nhập tên tài khoản..."
                           required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Mật khẩu (Password)</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                    <input type="password"
                           name="password"
                           class="form-control"
                           placeholder="Nhập mật khẩu..."
                           required>
                </div>
            </div>

            <button type="submit" class="btn btn-login">
                ĐĂNG NHẬP <i class="fa-solid fa-arrow-right-to-bracket ms-2"></i>
            </button>

            <div class="text-center mt-4">
                <span style="color: #777; font-size: 14px;">Chưa có tài khoản?</span>
                <a th:href="@{/auth/register}" class="text-link text-decoration-none"> Đăng ký ngay</a>
            </div>

        </form>

    </div>
</div>

</body>
</html>
