<!DOCTYPE html>

<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      th:fragment="dynamic-layout(mainContent)">

<head>
    <meta charset="UTF-8">
    <title>KC Drink - Hệ thống quản lý</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/ban-hang.css">


</head>

<body>

<div class="app-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="logo-container d-flex align-items-center justify-content-center">
            <img src="logo.jpg"
                 alt="KC Drink Logo">

            <div>
                <div class="logo-text">KC DRINK</div>
                <small style="color:#ffaa44;font-size:0.75rem;font-weight:bold;">
                    NHÂN VIÊN
                </small>
            </div>
        </div>
        <div class="menu-list">
            <!-- BÁN HÀNG -->
            <a th:href="@{/nhan-vien/ban-hang}"
               class="menu-item"
               th:classappend="${menuActive == 'ban-hang'} ? ' active-main'">

                <i class="fa-solid fa-cash-register"></i>
                <span>Bán hàng</span>
            </a>
            <hr style="border-color:#5a4022;margin:15px 25px;">
            <!-- DANH MỤC SẢN PHẨM -->
            <a href="#danhMucCollapse"
               class="menu-item d-flex justify-content-between align-items-center"
               data-bs-toggle="collapse">

                <div>
                    <i class="fa-solid fa-layer-group"></i>
                    <span>Danh mục sản phẩm</span>
                </div>

                <i class="fa-solid fa-chevron-down ms-auto"></i>
            </a>

            <div class="collapse show sub-menu-container"
                 id="danhMucCollapse"
                 th:if="${danhMucs != null}">

                <!-- TẤT CẢ SẢN PHẨM -->
                <a th:href="@{/nhan-vien/san-pham}"
                   class="sub-menu-item">

                    <i class="fa-solid fa-box"></i>
                    <span>Tất cả sản phẩm</span>

                </a>

                <!-- DANH MỤC -->
                <a th:each="dm : ${danhMucs}"
                   th:href="@{/nhan-vien/san-pham(danhMucId=${dm.idDanhMuc})}"
                   class="sub-menu-item">

                    <i class="fa-solid fa-mug-hot"></i>

                    <span th:text="${dm.tenDanhMuc}">
                        Danh mục
                    </span>
                </a>

            </div>

            <hr style="border-color:#5a4022;margin:15px 25px;">

            <!-- HÓA ĐƠN -->
            <a th:href="@{/nhan-vien/hoa-don}"
               class="menu-item"
               th:classappend="${menuActive == 'hoa-don'} ? ' active-main'">

                <i class="fa-solid fa-file-invoice-dollar"></i>
                <span>Hóa đơn</span>

            </a>

            <!-- KHÁCH HÀNG -->
            <a th:href="@{/nhan-vien/khach-hang}"
               class="menu-item"
               th:classappend="${menuActive == 'khach-hang'} ? ' active-main'">

                <i class="fa-solid fa-users"></i>
                <span>Khách hàng</span>

            </a>

            <!-- VOUCHER -->
            <a th:href="@{/nhan-vien/voucher}"
               class="menu-item"
               th:classappend="${menuActive == 'voucher'} ? ' active-main'">

                <i class="fa-solid fa-ticket"></i>
                <span>Voucher</span>

            </a>

            <!-- KHUYẾN MÃI -->
            <a th:href="@{/nhan-vien/khuyen-mai}"
               class="menu-item"
               th:classappend="${menuActive == 'khuyen-mai'} ? ' active-main'">

                <i class="fa-solid fa-percent"></i>
                <span>Khuyến mãi</span>

            </a>

            <!-- NGUYÊN LIỆU -->
            <a th:href="@{/nhan-vien/nguyen-lieu}"
               class="menu-item"
               th:classappend="${menuActive == 'nguyen-lieu'} ? ' active-main'">

                <i class="fa-solid fa-flask"></i>
                <span>Nguyên liệu</span>

            </a>

            <!-- CÔNG THỨC -->
            <a th:href="@{/nhan-vien/cong-thuc}"
               class="menu-item"
               th:classappend="${menuActive == 'cong-thuc'} ? ' active-main'">

                <i class="fa-solid fa-book"></i>
                <span>Công thức</span>

            </a>

        </div>
        <div class="logout-box">
            <a href="/auth/logout"
               class="menu-item text-danger fw-bold">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Đăng xuất</span>
            </a>
        </div>

    </aside>

    <!-- CONTENT -->
    <main class="content-wrapper">
        <div th:replace="${mainContent}"></div>
    </main>


</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/ban-hang.js"></script>
</body>
</html>
